name: Receive Dispatch Build

on:
  repository_dispatch:
    types:
      - build-requested

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-selected-app:
    name: Build Selected App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Show repository dispatch payload
        run: |
          echo "=================================================="
          echo "  Repository Dispatch Received"
          echo "=================================================="
          echo "  Event type    : ${{ github.event.action }}"
          echo "  App name      : ${{ github.event.client_payload.app_name }}"
          echo "  Source repo   : ${{ github.event.client_payload.source_repo }}"
          echo "  Source ref    : ${{ github.event.client_payload.source_ref }}"
          echo "  Source SHA    : ${{ github.event.client_payload.source_sha }}"
          echo "  Artifact type : ${{ github.event.client_payload.artifact_type }}"
          echo "  Triggered by  : ${{ github.event.client_payload.triggered_by }}"
          echo "=================================================="

      - name: Validate dispatch payload
        run: |
          set -euo pipefail

          APP_NAME="${{ github.event.client_payload.app_name }}"
          SOURCE_REPO="${{ github.event.client_payload.source_repo }}"
          SOURCE_REF="${{ github.event.client_payload.source_ref }}"
          SOURCE_SHA="${{ github.event.client_payload.source_sha }}"
          ARTIFACT_TYPE="${{ github.event.client_payload.artifact_type }}"

          if [ -z "${APP_NAME}" ]; then
            echo "ERROR: app_name is missing."
            exit 1
          fi

          if [ -z "${SOURCE_REPO}" ]; then
            echo "ERROR: source_repo is missing."
            exit 1
          fi

          if [ -z "${SOURCE_REF}" ]; then
            echo "ERROR: source_ref is missing."
            exit 1
          fi

          if [ -z "${SOURCE_SHA}" ]; then
            echo "ERROR: source_sha is missing."
            exit 1
          fi

          if [ -z "${ARTIFACT_TYPE}" ]; then
            echo "ERROR: artifact_type is missing."
            exit 1
          fi

          case "${APP_NAME}" in
            node)
              if [ "${ARTIFACT_TYPE}" != "tgz" ]; then
                echo "ERROR: Node artifact_type must be tgz."
                exit 1
              fi
              ;;
            python)
              if [ "${ARTIFACT_TYPE}" != "whl" ]; then
                echo "ERROR: Python artifact_type must be whl."
                exit 1
              fi
              ;;
            *)
              echo "ERROR: Unsupported app_name: ${APP_NAME}"
              exit 1
              ;;
          esac

          echo "Dispatch payload validation passed."

      - name: Checkout source repository at exact SHA
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.source_sha }}
          path: source

      - name: Show checked out source
        run: |
          echo "Checked out source repository:"
          echo "Repository : ${{ github.event.client_payload.source_repo }}"
          echo "Ref        : ${{ github.event.client_payload.source_ref }}"
          echo "SHA        : ${{ github.event.client_payload.source_sha }}"
          echo ""
          echo "Top-level files:"
          ls -lh source

      # ------------------------------------------------------------
      # Build Node.js app
      # ------------------------------------------------------------

      - name: Set up Node.js
        if: ${{ github.event.client_payload.app_name == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node and npm versions
        if: ${{ github.event.client_payload.app_name == 'node' }}
        run: |
          node --version
          npm --version

      - name: Build Node artifact
        if: ${{ github.event.client_payload.app_name == 'node' }}
        working-directory: source/apps/node
        run: |
          set -euo pipefail

          echo "Installing Node dependencies using npm ci..."
          npm ci

          echo "Building Node package..."
          npm run build

          echo "Node build output:"
          ls -lh dist/

          if ! ls dist/*.tgz >/dev/null 2>&1; then
            echo "ERROR: Node .tgz artifact was not generated."
            exit 1
          fi

          cd dist
          sha256sum *.tgz > SHA256SUMS.txt

          echo "Generated checksum:"
          cat SHA256SUMS.txt

      - name: Upload Node artifact
        if: ${{ github.event.client_payload.app_name == 'node' }}
        uses: actions/upload-artifact@v4
        with:
          name: node-build-${{ github.event.client_payload.source_sha }}
          path: |
            source/apps/node/dist/*.tgz
            source/apps/node/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

      # ------------------------------------------------------------
      # Build Python app
      # ------------------------------------------------------------

      - name: Set up Python
        if: ${{ github.event.client_payload.app_name == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python pyproject.toml
        if: ${{ github.event.client_payload.app_name == 'python' }}
        working-directory: source/apps/python
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          tomllib.loads(Path("pyproject.toml").read_text())
          print("pyproject.toml is valid TOML")
          PY

      - name: Build Python artifact
        if: ${{ github.event.client_payload.app_name == 'python' }}
        working-directory: source/apps/python
        run: |
          set -euo pipefail

          echo "Installing Python dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

          echo "Building Python wheel..."
          python -m build

          echo "Python build output:"
          ls -lh dist/

          if ! ls dist/*.whl >/dev/null 2>&1; then
            echo "ERROR: Python .whl artifact was not generated."
            exit 1
          fi

          cd dist
          sha256sum *.whl > SHA256SUMS.txt

          echo "Generated checksum:"
          cat SHA256SUMS.txt

      - name: Upload Python artifact
        if: ${{ github.event.client_payload.app_name == 'python' }}
        uses: actions/upload-artifact@v4
        with:
          name: python-build-${{ github.event.client_payload.source_sha }}
          path: |
            source/apps/python/dist/*.whl
            source/apps/python/dist/SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error

      - name: Write build summary
        run: |
          {
            echo "## Repository Dispatch Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| App | ${{ github.event.client_payload.app_name }} |"
            echo "| Source repo | ${{ github.event.client_payload.source_repo }} |"
            echo "| Source ref | ${{ github.event.client_payload.source_ref }} |"
            echo "| Source SHA | ${{ github.event.client_payload.source_sha }} |"
            echo "| Artifact type | ${{ github.event.client_payload.artifact_type }} |"
            echo "| Triggered by | ${{ github.event.client_payload.triggered_by }} |"
            echo ""
            echo "Repo 2 checked out Repo 1 at the exact source SHA and built the selected app artifact."
          } >> "$GITHUB_STEP_SUMMARY"